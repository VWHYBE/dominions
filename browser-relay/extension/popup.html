<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dominions Relay</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --text: #e0e0e0;
      --muted: #888;
      --green: #2ecc71;
      --red: #e74c3c;
      --amber: #f39c12;
      --blue: #3498db;
      --border: #2c3e60;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      padding: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .logo {
      width: 22px;
      height: 22px;
      background: var(--blue);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .title { font-weight: 600; font-size: 14px; }
    .subtitle { font-size: 11px; color: var(--muted); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .value { font-weight: 600; font-size: 12px; }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 5px;
    }
    .dot--green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot--red   { background: var(--red); }
    .dot--amber { background: var(--amber); }

    .tab-info {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
    }

    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn--attach  { background: var(--green); color: #fff; }
    .btn--detach  { background: var(--red);   color: #fff; }
    .btn--loading { background: var(--amber); color: #fff; }

    .hint {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
      line-height: 1.5;
    }
    .error-msg {
      font-size: 11px;
      color: var(--red);
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">D</div>
    <div>
      <div class="title">Dominions Relay</div>
      <div class="subtitle">Browser Control Bridge</div>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <span class="label">Relay Server</span>
      <span class="value" id="relay-status">
        <span class="dot dot--amber"></span> Checking…
      </span>
    </div>
    <div class="row" style="margin-top:8px">
      <span class="label">Active Tab</span>
      <span class="value" id="tab-status">
        <span class="dot dot--red"></span> None
      </span>
    </div>
    <div class="tab-info" id="tab-info" hidden></div>
  </div>

  <button id="toggle-btn" class="btn btn--loading" disabled>Loading…</button>
  <p class="hint" id="hint-text">Open a tab you want to control, then click Attach.</p>
  <p class="error-msg" id="error-msg" hidden></p>

  <script src="popup.js"></script>
</body>
</html>
